<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric's Dive Map</title>
  <meta name="description" content="Interactive map of 150+ scuba dive sites around the world">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="loading" class="loading-overlay">
    <div class="loading-text">Diving in...</div>
  </div>

  <header>
    <div class="logo">
      <span class="logo-icon">&#x1F30A;</span>
      <h1>Eric's <span>Dive Map</span></h1>
    </div>
    <div class="stats">
      <div><span id="dive-count" class="stat-value">0</span> dives</div>
      <div><span id="trip-count" class="stat-value">0</span> trips</div>
      <div><span id="country-count" class="stat-value">0</span> countries</div>
    </div>
  </header>

  <div id="map"></div>

  <aside class="sidebar" id="sidebar"></aside>

  <!-- Video Gallery Modal -->
  <div id="video-modal" class="video-modal">
    <div class="video-modal-backdrop"></div>
    <div class="video-modal-content">
      <div class="video-modal-header">
        <h2 class="video-modal-title">🎬 <span id="video-modal-trip"></span></h2>
        <button class="video-modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="video-modal-grid" id="video-modal-grid"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric's Dive Map</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤿</text></svg>">
  <meta name="description" content="Interactive map of 150+ scuba dive sites around the world">

  <!-- Analytics: Google Analytics 4 — replace G-XXXXXXXXXX with your Measurement ID -->
  <!-- See docs/analytics-setup.md for the 5-minute setup guide -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="loading" class="loading-overlay">
    <div class="loading-text">Diving in...</div>
  </div>

  <header>
    <div class="logo">
      <span class="logo-icon">&#x1F30A;</span>
      <h1>Eric's <span>Dive Map</span></h1>
    </div>
    <nav class="tab-nav" id="tab-nav">
      <button class="tab-btn active" data-tab="map">Map</button>
      <button class="tab-btn" data-tab="videos">Videos</button>
      <button class="tab-btn" data-tab="log">Dive Log</button>
    </nav>
    <div class="stats">
      <div><span id="dive-count" class="stat-value">0</span> dives</div>
      <div><span id="trip-count" class="stat-value">0</span> trips</div>
      <div><span id="country-count" class="stat-value">0</span> countries</div>
    </div>
  </header>

  <!-- Tab 1: Map -->
  <div id="map" class="tab-page tab-map active"></div>

  <aside class="sidebar" id="sidebar"></aside>

  <!-- Tab 2: Videos -->
  <section id="page-videos" class="tab-page tab-content-page">
    <div class="page-container">
      <div class="page-header">
        <h2>Dive Videos</h2>
        <p class="page-subtitle" id="videos-subtitle">All underwater footage from dive trips</p>
      </div>
      <div id="videos-content"></div>
    </div>
  </section>

  <!-- Tab 3: Dive Log -->
  <section id="page-log" class="tab-page tab-content-page">
    <div class="page-container">
      <div class="page-header">
        <h2>Dive Log</h2>
        <p class="page-subtitle"><span id="log-count">0</span> dives logged</p>
      </div>
      <div class="log-controls">
        <div class="log-search-wrap">
          <span class="log-search-icon">&#x1F50D;</span>
          <input type="text" id="log-search" class="log-search"
                 placeholder="Search sites, locations, trips, highlights...">
        </div>
        <div class="log-filters" id="log-filters"></div>
      </div>
      <div class="log-table-wrap">
        <table class="log-table" id="log-table">
          <thead>
            <tr>
              <th class="log-th-sortable" data-sort="site">Site</th>
              <th class="log-th-sortable" data-sort="location">Location</th>
              <th class="log-th-sortable" data-sort="trip">Trip</th>
              <th class="log-th-sortable" data-sort="depth_m">Depth</th>
              <th class="log-th-sortable" data-sort="date">Date</th>
              <th>Type</th>
              <th>Highlights</th>
            </tr>
          </thead>
          <tbody id="log-tbody"></tbody>
        </table>
        <div class="log-empty" id="log-empty" style="display:none;">No dives match your search.</div>
      </div>
    </div>
  </section>

  <!-- Video Gallery Modal -->
  <div id="video-modal" class="video-modal">
    <div class="video-modal-backdrop"></div>
    <div class="video-modal-content">
      <div class="video-modal-header">
        <h2 class="video-modal-title">🎬 <span id="video-modal-trip"></span></h2>
        <button class="video-modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="video-modal-grid" id="video-modal-grid"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>

  <script src="js/map.js"></script>
  <script src="js/travel-path.js"></script>
  <script src="js/app.js"></script>

  <!-- Analytics: Cloudflare beacon — async, never blocks map load -->
  <!-- Configure ENDPOINT in analytics/beacon.js after deploying the Worker -->
  <!-- See docs/cloudflare-setup.md -->
  <script src="analytics/beacon.js" async defer></script>
</body>
</html>

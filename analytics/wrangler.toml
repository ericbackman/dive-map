# Wrangler config for the Dive Map analytics Worker.
# See docs/cloudflare-setup.md for step-by-step deployment instructions.

name              = "dive-analytics"
main              = "worker.js"
compatibility_date = "2024-09-23"

# KV namespace — run: wrangler kv namespace create ANALYTICS_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "ANALYTICS_KV"
id      = "YOUR_KV_NAMESPACE_ID"

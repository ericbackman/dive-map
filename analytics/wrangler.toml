# Wrangler config for the Dive Map analytics Worker.
# See docs/cloudflare-setup.md for step-by-step deployment instructions.

name              = "dive-analytics"
main              = "worker.js"
compatibility_date = "2024-09-23"

# KV namespace — create this in the CF dashboard, then paste the ID below.
# Dashboard path: Workers & Pages → KV → Create namespace → name it "DIVE_ANALYTICS"
[[kv_namespaces]]
binding = "ANALYTICS_KV"
id      = "YOUR_KV_NAMESPACE_ID"   # replace after running: wrangler kv namespace create ANALYTICS_KV
